name: Bump and Publish SDK

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Prevents multiple "Bump" workflows from running at once and colliding
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Get all history so we can pull/rebase correctly

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # This solves the "divergent branches" error by rebasing your version bump 
          # on top of any new changes found on main
          git config --global pull.rebase true

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.version_type }} -m "chore: release v%s"
          echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Sync and Push
        run: |
          # 1. Pull latest changes from main (in case someone pushed during the 'Build' step)
          # The --rebase ensures our version bump commit stays at the very top
          git pull origin main --rebase
          
          # 2. Push the commit and the tag
          git push origin main --follow-tags

      - name: Publish to NPM
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "### 🚀 Release Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** v${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY